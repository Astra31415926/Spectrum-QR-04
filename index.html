<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ornament-QR</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-metal: #1a1a1a;
            --accent-orange: #FF6200;
            --accent-green: #00FF9D;
            --ui-border: #333;
            --ui-brass: #B8860B;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0; padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Roboto Mono', monospace;
            color: #e0e0e0;
        }

        /* === METAL TEXTURE BACKGROUND === */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% 0%, #2a2a2a 0%, #0f0f0f 70%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* === APP SHELL === */
        #app {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Dynamic Viewport Height for mobile */
        }

        /* === FIXED HEADERS === */
        .app-header {
            height: 56px;
            min-height: 56px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            z-index: 100;
        }
        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: lowercase;
        }
        .header-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            color: #888;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
        }
        .header-btn.hidden { visibility: hidden; }

        /* === FIXED BOTTOM NAV === */
        .app-footer {
            height: 60px;
            min-height: 60px;
            background: rgba(10, 10, 10, 0.98);
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            font-size: 10px; color: #666;
            cursor: pointer; transition: color 0.2s;
        }
        .nav-item.active { color: var(--ui-brass); }
        .nav-icon { font-size: 18px; margin-bottom: 2px; }

        /* === SCREEN MANAGEMENT === */
        .screen-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.2s ease;
            overflow-y: auto;
        }
        .screen.active {
            display: flex;
            opacity: 1;
            z-index: 10;
        }

        /* === MAIN SCREEN === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .main-desc { font-size: 13px; color: #888; margin-bottom: 40px; max-width: 260px; }
        
        .btn-row { display: flex; gap: 16px; width: 100%; max-width: 320px; }
        .btn-main {
            flex: 1; padding: 16px; border-radius: 12px;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px;
            border: 1px solid rgba(0,0,0,0.5);
            text-transform: uppercase; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-main:active { transform: scale(0.95); }
        
        /* Retro Style Buttons */
        .btn-create {
            background: linear-gradient(145deg, #e65c00, #cc5500);
            color: #fff;
            border-color: #ff8c00;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .btn-scan {
            background: linear-gradient(145deg, #00cc7a, #009960);
            color: #fff;
            border-color: #00ff9d;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        .btn-secondary {
            background: #222; color: #ccc; border: 1px solid #444;
            padding: 14px; border-radius: 10px; font-family: 'Orbitron', sans-serif;
            font-size: 14px; cursor: pointer; width: 100%;
        }
        .btn-secondary:active { background: #111; }

        /* === ORNAMENT SCREEN (Keyboard Friendly) === */
        .ornament-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }
        
        /* QR Zone: Sticks to top */
        .zone-qr {
            flex-shrink: 0;
            height: 40vh;
            min-height: 200px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer; /* Hint to tap to hide keyboard */
        }
        .qr-frame {
            width: 220px; height: 220px;
            background: #111;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .qr-frame canvas { width: 100%; height: 100%; object-fit: contain; }
        
        /* Controls: Under QR */
        .zone-controls {
            flex-shrink: 0;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
        }
        .btn-action {
            flex: 1; padding: 12px;
            background: #222; border: 1px solid #444;
            border-radius: 8px; color: #fff;
            font-size: 12px; font-weight: 600; text-transform: uppercase;
            cursor: pointer; transition: 0.2s;
        }
        .btn-action:active { background: #333; }
        .btn-action.save { background: #333; border-color: var(--ui-brass); color: var(--ui-brass); }

        /* Input: Fills rest */
        .zone-input {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Center input vertically in remaining space */
        }
        .text-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 14px;
            color: #fff;
            font-size: 16px; /* Prevents iOS zoom */
            outline: none;
            resize: none;
            min-height: 60px;
            font-family: 'Roboto Mono', monospace;
        }
        .text-input:focus { border-color: var(--accent-orange); }

        /* === 3D QR LAYOUT === */
        .layout-3d {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .input-3d {
            width: 100%;
            background: rgba(0,0,0,0.5); border: 1px solid #333;
            border-radius: 6px; padding: 10px; color: #fff;
            outline: none; font-size: 14px; font-family: monospace;
        }
        .input-3d:focus { border-color: #555; }

        /* === SCANNER OVERLAY === */
        #screen-scanner {
            position: absolute;
            background: #000;
            z-index: 200;
        }
        .scan-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #freeze-frame { display: none; position: absolute; width: 100%; height: 100%; object-fit: contain; }
        
        /* Viewfinder */
        .overlay-layer { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
        .viewfinder-corners {
            width: 70%; height: 70%; position: relative;
            border: 2px dashed rgba(255,255,255,0.2);
        }
        .corner { position: absolute; width: 20px; height: 20px; border-color: #fff; }
        .tl { top: -2px; left: -2px; border-top: 3px solid; border-left: 3px solid; }
        .tr { top: -2px; right: -2px; border-top: 3px solid; border-right: 3px solid; }
        .bl { bottom: -2px; left: -2px; border-bottom: 3px solid; border-left: 3px solid; }
        .br { bottom: -2px; right: -2px; border-bottom: 3px solid; border-right: 3px solid; }
        
        /* Flash */
        #flash-layer { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 200; transition: opacity 0.2s; }
        
        /* Bottom Scan Panel */
        .scan-panel {
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-top: 1px solid #333;
        }
        .scan-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .scan-res-box { position: relative; }
        .scan-res-box textarea {
            width: 100%; height: 40px; background: #111; border: 1px solid #333;
            border-radius: 4px; color: #fff; padding: 6px; font-size: 11px;
            text-align: center; resize: none;
        }
        .scan-indicator {
            position: absolute; top: -5px; right: -5px;
            width: 10px; height: 10px; border-radius: 50%;
            background: #333; border: 2px solid #000;
            transition: all 0.2s;
        }
        .scan-indicator.r.active { background: #FF004D; box-shadow: 0 0 8px #FF004D; }
        .scan-indicator.g.active { background: #00FF41; box-shadow: 0 0 8px #00FF41; }
        .scan-indicator.b.active { background: #0088FF; box-shadow: 0 0 8px #0088FF; }

    </style>
</head>
<body>

<div id="app">
    
    <!-- TOP NAV -->
    <header class="app-header">
        <div id="btn-back" class="header-btn" onclick="navBack()">←</div>
        <div class="header-title">ornament-QR</div>
        <div class="header-btn" onclick="toggleMenu()">☰</div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="screen-container">
        
        <!-- SCREEN: MAIN -->
        <div id="screen-main" class="screen active">
            <div class="main-content">
                <p class="main-desc">Create and scan ornamental QR codes with multi-channel encoding.</p>
                <div class="btn-row">
                    <button class="btn-main btn-create" onclick="navTo('create-choice')">+ Create</button>
                    <button class="btn-main btn-scan" onclick="startScanner()">🔍 Scan</button>
                </div>
            </div>
        </div>

        <!-- SCREEN: CREATE CHOICE -->
        <div id="screen-create-choice" class="screen">
            <div class="main-content">
                <div style="width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 16px;">
                    <button class="btn-secondary" onclick="navTo('ornament')">Ornament QR</button>
                    <button class="btn-secondary" onclick="navTo('3d')">3D QR (beta)</button>
                </div>
            </div>
        </div>

        <!-- SCREEN: ORNAMENT QR -->
        <div id="screen-ornament" class="screen">
            <div class="ornament-layout">
                <div class="zone-qr" onclick="blurInputs()">
                    <div class="qr-frame">
                        <canvas id="canvas-ornament" width="512" height="512"></canvas>
                    </div>
                </div>
                
                <div class="zone-controls">
                    <button class="btn-action" onclick="regenerateOrnament()">Regenerate</button>
                    <button class="btn-action save" onclick="saveImage('ornament')">Save</button>
                </div>

                <div class="zone-input">
                    <textarea id="input-ornament" class="text-input" placeholder="Enter text..." oninput="handleOrnamentInput()"></textarea>
                </div>
            </div>
        </div>

        <!-- SCREEN: 3D QR -->
        <div id="screen-3d" class="screen">
            <div class="layout-3d">
                <div class="qr-frame" style="width: 180px; height: 180px; margin-bottom: 10px;">
                    <canvas id="canvas-3d" width="512" height="512"></canvas>
                </div>
                <input id="input-r" class="input-3d" placeholder="RED" oninput="handle3DInput()">
                <input id="input-g" class="input-3d" placeholder="GREEN" oninput="handle3DInput()">
                <input id="input-b" class="input-3d" placeholder="BLUE" oninput="handle3DInput()">
                <button class="btn-action save" onclick="saveImage('3d')" style="width: 100%;">Save</button>
            </div>
        </div>

        <!-- SCREEN: SCANNER -->
        <div id="screen-scanner" class="screen">
            <div class="scan-viewport">
                <video id="video" playsinline autoplay muted></video>
                <canvas id="freeze-frame"></canvas>
                
                <div class="overlay-layer">
                    <div class="viewfinder-corners" id="viewfinder">
                        <div class="corner tl"></div><div class="corner tr"></div>
                        <div class="corner bl"></div><div class="corner br"></div>
                    </div>
                </div>
                <div id="flash-layer"></div>
            </div>
            
            <div class="scan-panel">
                <div class="scan-grid">
                    <div class="scan-res-box">
                        <div class="scan-indicator r" id="ind-r"></div>
                        <textarea id="r-text" placeholder="RED" readonly></textarea>
                    </div>
                    <div class="scan-res-box">
                        <div class="scan-indicator g" id="ind-g"></div>
                        <textarea id="g-text" placeholder="GREEN" readonly></textarea>
                    </div>
                    <div class="scan-res-box">
                        <div class="scan-indicator b" id="ind-b"></div>
                        <textarea id="b-text" placeholder="BLUE" readonly></textarea>
                    </div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-action" onclick="closeScanner()">Close</button>
                    <button class="btn-action" onclick="document.getElementById('file-input').click()">Gallery</button>
                    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)">
                </div>
            </div>
        </div>
        
        <!-- SCREEN: PLACEHOLDERS -->
        <div id="screen-gallery" class="screen"><div class="main-content">Gallery Coming Soon</div></div>
        <div id="screen-history" class="screen"><div class="main-content">History Coming Soon</div></div>
        <div id="screen-tech" class="screen"><div class="main-content">Technology Info</div></div>
        <div id="screen-contacts" class="screen"><div class="main-content">Contact Us</div></div>

    </div>

    <!-- BOTTOM NAV -->
    <footer class="app-footer">
        <div class="nav-item active" onclick="navTo('main')">
            <div class="nav-icon">🏠</div>
            <span>Main</span>
        </div>
        <div class="nav-item" onclick="navTo('history')">
            <div class="nav-icon">🕓</div>
            <span>History</span>
        </div>
        <div class="nav-item" onclick="navTo('tech')">
            <div class="nav-icon">⚙️</div>
            <span>Tech</span>
        </div>
        <div class="nav-item" onclick="navTo('contacts')">
            <div class="nav-icon">📧</div>
            <span>Contacts</span>
        </div>
    </footer>

    <!-- Menu Overlay -->
    <div id="menu-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.95); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
        <a href="#" onclick="toggleMenu()" style="font-size:24px; font-weight:bold;">About</a>
        <button onclick="toggleMenu()" style="margin-top:20px; color:#666;">Close</button>
    </div>

</div>

<script>
// ==========================================
// NAVIGATION & UI LOGIC
// ==========================================

const stateUI = { screen: 'main', history: ['main'] };
const elsUI = {
    backBtn: document.getElementById('btn-back'),
    screens: { 
        main: document.getElementById('screen-main'), 
        create: document.getElementById('screen-create-choice'), 
        ornament: document.getElementById('screen-ornament'),
        '3d': document.getElementById('screen-3d'),
        scanner: document.getElementById('screen-scanner'),
        gallery: document.getElementById('screen-gallery'),
        history: document.getElementById('screen-history'),
        tech: document.getElementById('screen-tech'),
        contacts: document.getElementById('screen-contacts')
    },
    footerItems: document.querySelectorAll('.nav-item')
};

function navTo(id) {
    // UI Logic
    elsUI.screens[stateUI.screen].classList.remove('active');
    elsUI.screens[id].classList.add('active');
    
    // Update Footer Active State
    elsUI.footerItems.forEach(el => el.classList.remove('active'));
    const navIndex = ['main', 'history', 'tech', 'contacts'].indexOf(id);
    if(navIndex >= 0) elsUI.footerItems[navIndex].classList.add('active');

    // History Logic
    if(id !== stateUI.screen) stateUI.history.push(stateUI.screen);
    stateUI.screen = id;

    // Header Back Button Logic
    if(id === 'main') elsUI.backBtn.classList.add('hidden');
    else elsUI.backBtn.classList.remove('hidden');
}

function navBack() {
    if (stateUI.history.length <= 1) { navTo('main'); return; }
    const prev = stateUI.history.pop();
    elsUI.screens[stateUI.screen].classList.remove('active');
    stateUI.screen = prev;
    elsUI.screens[prev].classList.add('active');
    
    if (prev === 'main') elsUI.backBtn.classList.add('hidden');
}

function toggleMenu() {
    const m = document.getElementById('menu-overlay');
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

function blurInputs() { document.activeElement.blur(); }

// ==========================================
// ORNAMENT ENGINE
// ==========================================

const ornamentState = { seed: Date.now() };

// 7x7 Sprites
const SPRITE_LIB = [
    [73,42,28,127,28,42,73], [127,65,93,85,93,65,127], [85,62,99,42,99,62,85],
    [42,119,34,73,34,119,42], [28,42,73,119,73,42,28], [0,62,34,42,46,32,63],
    [15,1,29,5,52,16,64], [64,96,112,120,112,96,64], [76,102,51,25,51,102,76],
    [119,69,117,0,87,81,119], [119,85,119,0,119,85,119], [119,65,93,20,93,65,119],
    [62,73,93,127,93,73,62], [42,107,8,119,8,107,42], [8,42,8,119,8,42,8],
    [28,8,65,99,65,8,28], [54,99,73,20,73,99,54], [63,31,15,7,3,1,0],
    [127,63,31,15,7,3,1], [127,31,31,7,7,1,1], [119,17,93,68,119,17,89],
    [119,21,87,80,127,17,89], [119,85,127,20,127,85,119], [87,80,87,0,117,5,117],
    [95,80,87,65,117,5,125], [30,80,87,65,117,5,60], [91,80,11,93,104,5,109],
    [42,99,8,93,8,99,42], [99,99,0,0,0,99,99], [99,99,99,99,99,99,99],
    [119,93,99,34,99,93,119], [54,85,99,8,99,85,54], [91,73,109,36,54,18,91],
    [127,8,107,34,107,8,127], [42,34,42,8,42,34,42], [56,43,9,127,72,106,14],
    [60,72,81,99,69,9,30], [12,56,33,107,66,14,24], [32,126,34,34,34,63,2],
    [100,94,51,42,102,61,19], [6,92,118,34,55,29,48], [28,62,119,99,119,62,28],
    [62,99,73,93,73,99,62], [126,67,89,85,77,97,63], [54,85,107,28,107,85,54],
    [127,119,99,73,99,119,127], [12,22,51,113,14,76,104], [107,73,8,127,8,73,107],
    [0,62,34,42,58,2,126], [85,21,117,5,125,1,127], [52,102,71,85,71,102,52],
    [8,8,42,34,54,20,93], [119,99,107,8,107,99,119], [62,34,107,8,107,34,62],
    [73,62,34,107,34,62,73], [123,123,96,107,3,111,111], [91,27,96,107,3,108,109],
    [0,63,32,62,2,126,0], [64,95,81,93,69,125,1], [51,51,102,102,76,76,25]
];

function seededRandom() {
    let x = Math.sin(ornamentState.seed++) * 10000;
    return x - Math.floor(x);
}

function handleOrnamentInput() {
    generateOrnament();
}

function regenerateOrnament() {
    ornamentState.seed = Date.now() + Math.random();
    generateOrnament();
}

function generateOrnament() {
    const text = document.getElementById('input-ornament').value;
    if (!text) return;

    try {
        const qr = qrcode(0, 'M');
        qr.addData(unescape(encodeURIComponent(text)));
        qr.make();

        const modCount = qr.getModuleCount();
        const quietZone = 4;
        const totalSize = modCount + quietZone * 2;
        const cellSize = 512 / totalSize;

        const ctx = document.getElementById('canvas-ornament').getContext('2d');
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, 512, 512);
        ctx.globalCompositeOperation = "screen";

        // Art Layers
        const gridR = buildGrid(totalSize);
        const gridG = buildGrid(totalSize);

        ctx.fillStyle = "#FF0000";
        drawGrid(ctx, gridR, totalSize, cellSize);
        
        ctx.fillStyle = "#00FF00";
        drawGrid(ctx, gridG, totalSize, cellSize);
        
        // Data Layer (Blue)
        ctx.fillStyle = "#0000FF";
        for(let r=0; r<modCount; r++) {
            for(let c=0; c<modCount; c++) {
                if(qr.isDark(r, c)) {
                    ctx.fillRect((c+quietZone)*cellSize, (r+quietZone)*cellSize, cellSize, cellSize);
                }
            }
        }
        ctx.globalCompositeOperation = "source-over";

    } catch(e) { console.error(e); }
}

function buildGrid(size) {
    const grid = Array(size).fill(0).map(() => Array(size).fill(0));
    const center = Math.floor(size/2);
    const maxBlocks = Math.ceil((size/2 + 7)/7);
    const octantMap = new Map();

    for(let by=0; by<maxBlocks; by++) {
        for(let bx=by; bx<maxBlocks; bx++) {
            const patternIdx = Math.floor(seededRandom() * SPRITE_LIB.length);
            const pattern = SPRITE_LIB[patternIdx];
            const flipX = seededRandom() > 0.5;
            const flipY = seededRandom() > 0.5;

            for(let py=0; py<7; py++) {
                for(let px=0; px<7; px++) {
                    let sX = flipX ? (6-px) : px;
                    let sY = flipY ? (6-py) : py;
                    
                    if((pattern[sY] >> (6-sX)) & 1) {
                        let xRel = (bx*7) + px - 3;
                        let yRel = (by*7) + py - 3;
                        
                        if(xRel >= yRel && yRel >= 0) {
                            octantMap.set(`${xRel},${yRel}`, true);
                        }
                    }
                }
            }
        }
    }

    octantMap.forEach((v, k) => {
        const [x, y] = k.split(',').map(Number);
        const points = [
            [x, y], [y, x], [-x, y], [-y, x],
            [x, -y], [y, -x], [-x, -y], [-y, -x]
        ];
        points.forEach(([px, py]) => {
            const aX = center + px;
            const aY = center + py;
            if(aX >= 0 && aX < size && aY >= 0 && aY < size) grid[aY][aX] = 1;
        });
    });

    return grid;
}

function drawGrid(ctx, grid, size, cell) {
    for(let r=0; r<size; r++) {
        for(let c=0; c<size; c++) {
            if(grid[r][c]) ctx.fillRect(c*cell, r*cell, cell+0.5, cell+0.5);
        }
    }
}

// ==========================================
// 3D QR ENGINE
// ==========================================

function handle3DInput() {
    const texts = [
        document.getElementById('input-r').value, 
        document.getElementById('input-g').value, 
        document.getElementById('input-b').value
    ];
    if(!texts.some(t => t.trim())) return;

    let maxVer = 1;
    texts.forEach(t => {
        if(!t) return;
        try {
            const tmp = qrcode(0, 'M');
            tmp.addData(unescape(encodeURIComponent(t)));
            tmp.make();
            const v = Math.floor((tmp.getModuleCount()-17)/4);
            if(v > maxVer) maxVer = v;
        } catch(e) {}
    });

    const ctx = document.getElementById('canvas-3d').getContext('2d');
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, 512, 512);
    ctx.globalCompositeOperation = "lighten";
    
    const colors = ["#FF0000", "#00FF00", "#0000FF"];

    texts.forEach((text, i) => {
        if(!text) return;
        try {
            const qr = qrcode(maxVer, 'M');
            qr.addData(unescape(encodeURIComponent(text)));
            qr.make();
            const mod = 512 / qr.getModuleCount();
            ctx.fillStyle = colors[i];
            for(let r=0; r<qr.getModuleCount(); r++) {
                for(let c=0; c<qr.getModuleCount(); c++) {
                    if(qr.isDark(r, c)) ctx.fillRect(c*mod, r*mod, mod, mod);
                }
            }
        } catch(e) {}
    });
    
    ctx.globalCompositeOperation = "source-over";
}

function saveImage(mode) {
    const canvas = mode === 'ornament' ? document.getElementById('canvas-ornament') : document.getElementById('canvas-3d');
    const link = document.createElement('a');
    link.download = `ornament_qr_${Date.now()}.png`;
    link.href = canvas.toDataURL();
    link.click();
}


// ==========================================
// SCANNER ENGINE (QRGB-13 Integration)
// ==========================================

const state = {
    scanning: false,
    locked: { r: false, g: false, b: false },
    results: { r: null, g: null, b: null },
    activeSearch: false,
    standardFailCount: 0,
    AUTO_TRIGGER_THRESHOLD: 90,
    time: 0,
    config: {
        R: { offset: 0, gain: 1.0, k1: 0.10, k2: 0.20 },
        G: { offset: 0, gain: 1.0, k1: 0.18, k2: 0.33 },
        B: { offset: 0, gain: 1.0, k1: 0.05, k2: 0.13 }
    }
};

const els = {
    video: document.getElementById('video'),
    canvas: document.getElementById('freeze-frame'), // Reusing freeze-frame for processing
    ctx: document.getElementById('freeze-frame').getContext('2d', { willReadFrequently: true }),
    freeze: document.getElementById('freeze-frame'),
    fCtx: document.getElementById('freeze-frame').getContext('2d', { willReadFrequently: true }),
    r: document.getElementById('r-text'), g: document.getElementById('g-text'), b: document.getElementById('b-text'),
    indR: document.getElementById('ind-r'), indG: document.getElementById('ind-g'), indB: document.getElementById('ind-b'),
    flash: document.getElementById('flash-layer')
};

// A. Standard Bradley
function applyBradleyStandard(imgData, chIdx) {
    const w = imgData.width, h = imgData.height;
    const input = imgData.data;
    const output = new Uint8ClampedArray(w * h * 4);
    const intImg = new Int32Array(w * h);
    const s = Math.floor(w / 8), t = 15;

    for (let y = 0; y < h; y++) {
        let sum = 0;
        for (let x = 0; x < w; x++) {
            sum += input[(y * w + x) * 4 + chIdx];
            intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
        }
    }

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
            const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
            const count = (x2 - x1) * (y2 - y1);
            const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
            const val = input[(y * w + x) * 4 + chIdx];
            const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
            const idx = (y * w + x) * 4;
            output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
        }
    }
    return output;
}

// B. SCI Math
function applySCIMath(imgData, ch, cfg) {
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
        let r = d[i], g = d[i+1], b = d[i+2];
        let target, n1, n2;
        
        if (ch === 'R') { target = r; n1 = g; n2 = b; }
        else if (ch === 'G') { target = g; n1 = r; n2 = b; }
        else { target = b; n1 = r; n2 = g; }

        let res = (target - (n1 * cfg.k1 + n2 * cfg.k2)) * cfg.gain + cfg.offset;
        res = Math.max(0, Math.min(255, res));
        d[i] = res; d[i+1] = res; d[i+2] = res; d[i+3] = 255;
    }
}

// Triangle Wave Oscillator
function getOscParam(t, period, min, max) {
    const cycle = t % period;
    const half = period / 2;
    const pos = (cycle < half) ? cycle / half : (period - cycle) / half;
    return min + pos * (max - min);
}

// MAIN LOOP
function processLoop() {
    if (!state.scanning) return;

    // 1. Get Fresh Data
    let sourceCopy = null;
    if (els.video.style.display !== 'none' && els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
        els.ctx.drawImage(els.video, 0, 0, 512, 512);
        sourceCopy = els.ctx.getImageData(0, 0, 512, 512);
    } else if (els.freeze.style.display !== 'none') {
        sourceCopy = els.fCtx.getImageData(0, 0, 512, 512);
    }

    if (sourceCopy) {
        let foundAny = false;
        
        if (state.standardFailCount > state.AUTO_TRIGGER_THRESHOLD) {
            if (!state.activeSearch) {
                state.activeSearch = true;
                console.log("Switching to Active Search");
            }
        }

        if (state.activeSearch) {
            state.time++;
            const gain = getOscParam(state.time, 100, 0.5, 3.5);
            const offset = getOscParam(state.time, 250, -80, 0);
            
            ['R', 'G', 'B'].forEach(ch => {
                if (!state.locked[ch.toLowerCase()]) {
                    const cfg = state.config[ch];
                    cfg.gain = gain;
                    cfg.offset = offset;

                    let workData = new ImageData(new Uint8ClampedArray(sourceCopy.data), 512, 512);
                    applySCIMath(workData, ch, cfg);
                    let mono = applyBradleyStandard(workData, 0);
                    
                    const code = jsQR(mono, 512, 512, { inversionAttempts: "attemptBoth" });
                    if (code) {
                        foundAny = true;
                        lockChannel(ch, code.data);
                    }
                }
            });
            
            if (!foundAny) {
                 let lastCh = ['R', 'G', 'B'].find(c => !state.locked[c.toLowerCase()]) || 'B';
                 let workData = new ImageData(new Uint8ClampedArray(sourceCopy.data), 512, 512);
                 applySCIMath(workData, lastCh, state.config[lastCh]);
                 applyBradleyStandard(workData, 0); 
                 // Visual feedback is tricky on a separate screen, skip for now
            }

        } else {
            state.standardFailCount++;
            
            ['R', 'G', 'B'].forEach((ch, idx) => {
                if (!state.locked[ch.toLowerCase()]) {
                    const mono = applyBradleyStandard(sourceCopy, idx);
                    const code = jsQR(mono, 512, 512, { inversionAttempts: "attemptBoth" });
                    
                    if (code) {
                        foundAny = true;
                        lockChannel(ch, code.data);
                    }
                }
            });
        }
    }
    requestAnimationFrame(processLoop);
}

// SUCCESS HANDLING
function lockChannel(ch, data) {
    state.locked[ch.toLowerCase()] = true;
    state.results[ch.toLowerCase()] = data;
    
    playBeep();
    flashScreen();
    
    const el = els[ch];
    const ind = els['ind' + ch.toUpperCase()];
    ind.classList.add('active');
    el.value = data;
    
    if (state.locked.r && state.locked.g && state.locked.b) {
        state.scanning = false;
        console.log("All channels decoded");
    }
}

function playBeep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 880; o.type = "square";
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
        o.start(); o.stop(ctx.currentTime + 0.1);
    } catch(e){}
}

function flashScreen() {
    els.flash.style.opacity = '1';
    setTimeout(() => els.flash.style.opacity = '0', 200);
}

// INIT & CONTROLS
function startScanner() {
    navTo('scanner');
    resetScanState();
    startCamera();
}

function closeScanner() {
    state.scanning = false;
    if(els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
    navBack();
}

function resetScanState() {
    state.locked = {r:false, g:false, b:false};
    state.results = {r:null, g:null, b:null};
    state.activeSearch = false;
    state.standardFailCount = 0;
    els.r.value = ""; els.g.value = ""; els.b.value = "";
    els.indR.classList.remove('active'); els.indG.classList.remove('active'); els.indB.classList.remove('active');
}

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        els.video.srcObject = stream;
        els.video.play();
        els.video.style.display = 'block';
        els.freeze.style.display = 'none';
        
        state.scanning = true;
        processLoop();
    } catch (e) { alert("Camera Error: " + e); }
}

function handleFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
            els.freeze.width = 512; els.freeze.height = 512;
            const s = Math.min(img.width, img.height);
            const sx = (img.width-s)/2, sy = (img.height-s)/2;
            els.fCtx.drawImage(img, sx, sy, s, s, 0, 0, 512, 512);
            
            els.freeze.style.display = 'block';
            els.video.style.display = 'none';

            state.scanning = true;
            state.standardFailCount = 100; // Force Active Search
            state.activeSearch = true;
            processLoop();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
}
